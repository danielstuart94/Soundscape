    <!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Soundscape V2 (Offline-first)</title>
  <style>
    body{font-family:Arial;margin:16px;max-width:980px}
    .card{border:1px solid #ddd;border-radius:10px;padding:12px;margin:10px 0}
    .row{margin:10px 0}
    button{padding:12px 14px;margin:6px 6px 0 0;font-size:15px}
    input,select{padding:8px;font-size:15px}
    .note{font-size:12px;color:#555;line-height:1.35}
    .hidden{display:none}
    .pill{display:inline-block;padding:2px 8px;border:1px solid #ddd;border-radius:999px;font-size:12px}
  </style>
</head>
<body>

<h2>Soundscape V2</h2>
<div class="note">Offline-first capture → ratings → export/upload later.</div>

<!-- PAGE: landing -->
<section id="page-landing" class="card">
  <h3>Consent</h3>
  <div class="row">
    <label><input type="checkbox" id="c-audio"> I consent to recording short audio clips</label>
  </div>
  <div class="row">
    <label><input type="checkbox" id="c-device" checked> Store device/browser info (recommended)</label>
  </div>
  <div class="row">
    <label><input type="checkbox" id="c-location"> Store location (optional)</label>
  </div>
  <div class="row">
    <button id="btn-start-session">Start session</button>
    <button id="btn-settings">Settings</button>
  </div>
  <div class="note" id="landing-status"></div>
</section>

<!-- PAGE: settings -->
<section id="page-settings" class="card hidden">
  <h3>Settings</h3>
  <div class="row">
    Clip length:
    <select id="set-cliplen">
      <option value="5">5s</option>
      <option value="10" selected>10s</option>
      <option value="15">15s</option>
    </select>
  </div>
  <div class="row">
    Capture mode:
    <select id="set-mode">
      <option value="manual" selected>Manual</option>
      <option value="30">Every 30s</option>
      <option value="60">Every 60s</option>
    </select>
  </div>
  <div class="row">
    Features:
    <label><input type="checkbox" id="set-basic" checked> Basic (LAeq/Lmax proxies)</label><br/>
    <label><input type="checkbox" id="set-activity" checked> Activity (flux proxy)</label><br/>
    <label><input type="checkbox" id="set-spectral" checked> Spectral (centroid/flatness)</label><br/>
    <label><input type="checkbox" id="set-oct" > Approx octave bands (slower)</label>
  </div>
  <div class="row">
    <button id="btn-save-settings">Save</button>
    <button id="btn-back-landing">Back</button>
  </div>
  <div class="note" id="settings-status"></div>
</section>

<!-- PAGE: setup -->
<section id="page-setup" class="card hidden">
  <h3>Session setup</h3>
  <div class="row">
    Session name: <input id="sess-name" placeholder="e.g. Brixton AM run" style="width:320px"/>
  </div>
  <div class="row">
    Site label: <input id="sess-site" placeholder="e.g. Brixton Station Rd" style="width:320px"/>
  </div>
  <div class="row">
    Context:
    <select id="sess-context">
      <option>Street</option><option>Park</option><option>Square</option><option>Office</option>
      <option>Cafe</option><option>Transit</option><option>Other</option>
    </select>
  </div>
  <div class="row">
    Optional site photo: <input type="file" id="sess-photo" accept="image/*" capture="environment"/>
  </div>
  <div class="row">
    <button id="btn-begin">Begin capture</button>
    <button id="btn-cancel-setup">Cancel</button>
  </div>
  <div class="note" id="setup-status"></div>
</section>

<!-- PAGE: capture (placeholder for now) -->
<section id="page-capture" class="card hidden">
  <h3>Capture</h3>
  <div class="note">Next chunk will add mic capture + clip storage + rating screen.</div>
  <div class="row">
    <span class="pill" id="cap-meta">—</span>
  </div>
  <div class="row">
    <button id="btn-end">End session</button>
  </div>
</section>

<script>
(() => {
  // ---------- simple router ----------
  const pages = ["landing","settings","setup","capture"];
  const show = (name) => {
    for (const p of pages) document.getElementById(`page-${p}`).classList.add("hidden");
    document.getElementById(`page-${name}`).classList.remove("hidden");
  };

  // ---------- app state ----------
  const state = {
    consent: { audio:false, device:true, location:false },
    settings: { clipLen:10, mode:"manual", basic:true, activity:true, spectral:true, oct:false },
    session: null, // will be created on setup
  };

  // ---------- UI wiring ----------
  const el = (id) => document.getElementById(id);

  el("btn-settings").onclick = () => show("settings");
  el("btn-back-landing").onclick = () => show("landing");

  el("btn-save-settings").onclick = () => {
    state.settings.clipLen = parseInt(el("set-cliplen").value,10);
    state.settings.mode = el("set-mode").value;
    state.settings.basic = el("set-basic").checked;
    state.settings.activity = el("set-activity").checked;
    state.settings.spectral = el("set-spectral").checked;
    state.settings.oct = el("set-oct").checked;
    el("settings-status").textContent = "Saved.";
  };

  el("btn-start-session").onclick = () => {
    state.consent.audio = el("c-audio").checked;
    state.consent.device = el("c-device").checked;
    state.consent.location = el("c-location").checked;

    if (!state.consent.audio) {
      el("landing-status").textContent = "Audio consent is required to proceed.";
      return;
    }
    el("landing-status").textContent = "";
    show("setup");
  };

  el("btn-cancel-setup").onclick = () => show("landing");

  el("btn-begin").onclick = async () => {
    const name = el("sess-name").value.trim();
    const site = el("sess-site").value.trim();
    const context = el("sess-context").value;

    if (!name || !site) { el("setup-status").textContent = "Enter session name + site label."; return; }

    // Create a session object (we’ll persist to IndexedDB in the next chunk)
    state.session = {
      session_id: crypto.randomUUID(),
      created_at: new Date().toISOString(),
      name, site, context,
      settings: {...state.settings},
      consent: {...state.consent},
      device: state.consent.device ? {
        userAgent: navigator.userAgent,
        platform: navigator.platform || null
      } : null,
      location: null,
      photo: null, // will store compressed blob later
      clips: []
    };

    el("setup-status").textContent = "";

    // show metadata in capture page
    el("cap-meta").textContent = `${state.session.site} • ${state.session.context} • ${state.session.session_id.slice(0,8)}`;

    show("capture");
  };

  el("btn-end").onclick = () => {
    state.session = null;
    show("landing");
  };

  // default
  show("landing");
})();
</script>

</body>
    </html>
